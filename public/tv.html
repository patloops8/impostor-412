<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>412 — Vista TV</title>
<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="wrap wrap-tv">
  <section id="tv-join" class="center-flex">
    <h1 style="font-size:3rem;">412 · Vista TV</h1>
    <p>Esta pantalla muestra la partida en grande. Entra el código de la sala.</p>
    <div class="row" style="max-width:340px;">
      <input type="text" id="tv-code" placeholder="Código" maxlength="4" style="text-transform:uppercase;" />
      <button class="btn-primary" id="tv-connect">Ver</button>
    </div>
    <p class="error-text hidden" id="tv-error"></p>
  </section>

  <section id="tv-live" class="hidden">
    <div class="between">
      <p class="eyebrow">412 · Sala <span id="tv-room-code"></span></p>
      <p class="eyebrow" id="tv-status-label"></p>
    </div>
    <div id="tv-content" style="margin-top:20px;"></div>
  </section>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io({ transports:['websocket','polling'], reconnection:true, reconnectionAttempts:Infinity, reconnectionDelay:800, reconnectionDelayMax:4000, timeout:20000 });
const $=id=>document.getElementById(id);
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
let players=[];
const params=new URLSearchParams(location.search);
const preCode=params.get('c')||params.get('codigo');
if(preCode){ $('tv-code').value=preCode.toUpperCase(); }

$('tv-connect').addEventListener('click',connect);
function connect(){
  const code=$('tv-code').value.trim().toUpperCase();
  if(!code)return;
  socket.emit('tv:watch',{code},(res)=>{
    if(!res||!res.ok){ $('tv-error').textContent='Sala no encontrada.'; $('tv-error').classList.remove('hidden'); return; }
    $('tv-room-code').textContent=code;
    $('tv-join').classList.add('hidden'); $('tv-live').classList.remove('hidden');
  });
}
if(preCode){ setTimeout(connect,400); }

socket.on('room:update',(st)=>{
  players=st.players;
  if(st.status==='lobby'){
    $('tv-status-label').textContent='En el lobby';
    let h=`<h1 style="font-size:2.5rem;text-align:center;">Entren con el código <span style="color:var(--lime);">${st.code}</span></h1>`;
    h+='<div class="player-grid" style="margin-top:24px;">';
    st.players.forEach(p=>h+=`<div class="player-chip"><div class="name">${esc(p.name)}</div><div class="meta">${p.isHost?'★ anfitrión':''}</div></div>`);
    h+='</div>';
    $('tv-content').innerHTML=h;
  }
});

// El Impostor
socket.on('imp:round',({roundNumber})=>{ $('tv-status-label').textContent='El Impostor · Vuelta '+roundNumber; });
socket.on('imp:clue',({name,word})=>{
  const c=$('tv-content');
  if(!c.querySelector('#tv-clue-log')) c.innerHTML='<h2 style="font-size:1.6rem;margin-bottom:14px;">Pistas</h2><div class="clue-log" id="tv-clue-log"></div>';
  const it=document.createElement('div'); it.className='clue-item'; it.innerHTML=`<span style="font-size:1.2rem;">${esc(word)}</span><span class="who">${esc(name)}</span>`;
  $('tv-clue-log').prepend(it);
});
socket.on('imp:voting',()=>{ $('tv-content').innerHTML='<div class="center-flex"><h1 style="font-size:2.5rem;">Votación en curso</h1><p>Los jugadores votan desde su celular</p></div>'; });
socket.on('imp:elimination',({eliminatedName,wasImpostor})=>{ $('tv-content').innerHTML=`<div class="reveal-banner ${wasImpostor?'caught':'escaped'}"><p class="eyebrow">${wasImpostor?'¡Atrapado!':'Era inocente'}</p><h1 style="font-size:2.5rem;">${esc(eliminatedName)}</h1></div>`; });
socket.on('imp:manga_over',({impostorNames,concept,scores})=>{
  let h=`<div class="reveal-banner caught"><h1 style="font-size:2rem;">${impostorNames.join(', ')} ${impostorNames.length>1?'eran':'era'} impostor</h1><p>Concepto: ${esc(concept.name)}</p></div><div class="card" style="margin-top:16px;">`;
  scores.forEach((p,i)=>h+=`<div class="score-row"><span class="rank">#${i+1}</span><span style="flex:1;margin-left:8px;">${esc(p.name)}</span><span class="points">${p.score} pts</span></div>`);
  h+='</div>'; $('tv-content').innerHTML=h;
});

// Mentiroso
socket.on('lie:round',({roundNumber,category})=>{ $('tv-status-label').textContent='Mentiroso · Ronda '+roundNumber; $('tv-content').innerHTML=`<div class="card center-flex" style="padding:40px;"><p class="eyebrow">Categoría</p><h1 style="font-size:2.2rem;text-align:center;">${esc(category)}</h1></div>`; });
socket.on('lie:claim',({name,amount})=>{ $('tv-content').innerHTML=`<div class="center-flex"><p class="eyebrow">${esc(name)} dice poder nombrar</p><h1 style="font-size:5rem;color:var(--lime);">${amount}</h1></div>`; });
socket.on('lie:accused',({accuserName,accusedName,target})=>{ $('tv-content').innerHTML=`<div class="center-flex"><p class="eyebrow">¡Mentiroso!</p><h1 style="font-size:2rem;">${esc(accusedName)} debe nombrar ${target}</h1><p>${esc(accuserName)} no le creyó</p></div>`; });
socket.on('lie:resolved',({success,accusedName,scores})=>{
  let h=`<div class="reveal-banner ${success?'caught':'escaped'}"><h1 style="font-size:2rem;">${esc(accusedName)} ${success?'sí pudo':'falló'}</h1></div><div class="card" style="margin-top:16px;">`;
  scores.forEach((p,i)=>h+=`<div class="score-row"><span class="rank">#${i+1}</span><span style="flex:1;margin-left:8px;">${esc(p.name)}</span><span class="points">${p.score} pts</span></div>`);
  h+='</div>'; $('tv-content').innerHTML=h;
});

// Subasta
socket.on('sub:formation_decided',({formation})=>{ $('tv-status-label').textContent='Subasta · '+formation; });
socket.on('sub:card',({cardIndex,totalCards,cardId,positionLabel,startingPrice,position})=>{
  $('tv-status-label').textContent=`Subasta · Carta ${cardIndex+1}/${totalCards}`;
  $('tv-content').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;">
    <div class="silhouette-container" style="max-width:320px;"><img id="tv-sil" class="silhouette-img" src=""/><div id="tv-sil-ph" class="silhouette-placeholder hidden"><span>?</span></div></div>
    <div><span class="position-badge ${posGroup(position)}">${positionLabel}</span><p style="font-family:var(--mono);font-size:2rem;color:var(--lime);margin-top:12px;">$${startingPrice}M</p><div class="countdown-circle" id="tv-sub-cd" style="width:90px;height:90px;font-size:2rem;margin-top:16px;">15</div><div class="clue-log" id="tv-sub-bids" style="margin-top:16px;"></div></div></div>`;
  loadTvSil(cardId,positionLabel,false);
});
socket.on('sub:tick',({secondsLeft})=>{ const el=$('tv-sub-cd'); if(el){el.textContent=secondsLeft;el.classList.toggle('urgent',secondsLeft<=5);} });
socket.on('sub:timer_extended',({secondsLeft})=>{ const el=$('tv-sub-cd'); if(el)el.textContent=secondsLeft; });
socket.on('sub:bid_public',({name,amount})=>{ const l=$('tv-sub-bids'); if(l){const it=document.createElement('div');it.className='clue-item';it.innerHTML=`<span style="color:var(--lime);">$${amount}M</span><span class="who">${esc(name)}</span>`;l.prepend(it);} });
socket.on('sub:card_resolved',({cardId,cardName,positionLabel,cardTroll,result,winnerName})=>{
  let txt=result.type==='discard'?'Nadie se la llevó':(winnerName?`${winnerName} la ganó por $${result.amount}M`:'');
  $('tv-content').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;">
    <div class="silhouette-container" style="max-width:320px;"><img id="tv-sil-r" class="silhouette-img revealed" src=""/><div id="tv-sil-r-ph" class="silhouette-placeholder hidden"><span>?</span></div></div>
    <div><p class="eyebrow">${cardTroll?'🎭 ¡TROLL!':positionLabel}</p><h1 style="font-size:2.2rem;">${esc(cardName)}</h1><p style="margin-top:10px;">${esc(txt)}</p></div></div>`;
  loadTvSil(cardId,positionLabel,true,'tv-sil-r','tv-sil-r-ph');
});
socket.on('sub:game_over',({mode,scores,championName})=>{
  let h='<h1 style="font-size:2rem;text-align:center;margin-bottom:20px;">Resultado Final</h1>';
  if(mode==='votacion'&&championName) h+=`<h2 style="text-align:center;color:var(--lime);margin-bottom:16px;">🏆 ${esc(championName)}</h2>`;
  h+='<div class="card">';
  scores.forEach((s,i)=>{ const det=mode==='votacion'?(i===0?'🏆':''):('OVR '+s.ovr); h+=`<div class="score-row"><span class="rank">#${i+1}</span><span style="flex:1;margin-left:8px;">${esc(s.name)}</span><span class="points">${det}</span></div>`; });
  h+='</div>'; $('tv-content').innerHTML=h;
});

// La Frecuencia (vista de solo lectura: sin interaccion, solo estado + revelacion)
const AVATAR_PALETTE=[{bg:'#b6ff2e'},{bg:'#e9b949'},{bg:'#8b54e0'},{bg:'#ff4d4d'},{bg:'#4e8ecb'}];
function avatarColor(id){ let h=0; for(let i=0;i<(id||'').length;i++)h=(h*31+id.charCodeAt(i))>>>0; return AVATAR_PALETTE[h%AVATAR_PALETTE.length].bg; }
const WAVE_CX=150, WAVE_CY=148, WAVE_R=128;
function waveXY(value,r){ const rad=(180-(value/100)*180)*Math.PI/180; return { x:WAVE_CX+r*Math.cos(rad), y:WAVE_CY-r*Math.sin(rad) }; }
function waveWedgePath(centerVal,halfWidth,r){
  const p1=waveXY(Math.max(0,centerVal-halfWidth),r), p2=waveXY(Math.min(100,centerVal+halfWidth),r);
  return `M ${WAVE_CX},${WAVE_CY} L ${p1.x.toFixed(2)},${p1.y.toFixed(2)} A ${r},${r} 0 0,1 ${p2.x.toFixed(2)},${p2.y.toFixed(2)} Z`;
}
function waveArcTrackPath(r){ const p1=waveXY(0,r), p2=waveXY(100,r); return `M ${p1.x.toFixed(2)},${p1.y.toFixed(2)} A ${r},${r} 0 0,1 ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`; }
// Corta un texto largo en varias lineas (sin partir palabras) para que quepa
// junto al dial sin pisarse con la etiqueta del otro extremo.
function waveLabelLines(text,maxChars){
  const words=(text||'').split(' '); const lines=[]; let cur='';
  for(const w of words){ const test=cur?cur+' '+w:w; if(test.length>maxChars&&cur){lines.push(cur);cur=w;} else cur=test; }
  if(cur)lines.push(cur);
  return lines;
}
function waveLabelSvg(x,y,anchor,text){
  const lines=waveLabelLines(text,15);
  let out=`<text class="wave-label" x="${x.toFixed(2)}" text-anchor="${anchor}">`;
  lines.forEach((line,i)=>{ out+=`<tspan x="${x.toFixed(2)}" y="${(y+i*13).toFixed(2)}">${esc(line)}</tspan>`; });
  return out+`</text>`;
}
function renderTvWaveDial(left,right,target,needles){
  let svg=`<svg viewBox="0 0 300 172" style="width:100%;max-width:420px;display:block;margin:0 auto;">`;
  if(target!=null){
    svg+=`<path class="wave-zone-outer" d="${waveWedgePath(target,16,WAVE_R)}"/>`;
    svg+=`<path class="wave-zone-mid" d="${waveWedgePath(target,9,WAVE_R)}"/>`;
    svg+=`<path class="wave-zone-bullseye" d="${waveWedgePath(target,4,WAVE_R)}"/>`;
  }
  svg+=`<path class="wave-arc-track" d="${waveArcTrackPath(WAVE_R)}"/>`;
  const lp=waveXY(2,WAVE_R+14), rp=waveXY(98,WAVE_R+14);
  svg+=waveLabelSvg(lp.x,lp.y,'start',left);
  svg+=waveLabelSvg(rp.x,rp.y,'end',right);
  (needles||[]).forEach(n=>{
    const tip=waveXY(n.value,WAVE_R-14), namePos=waveXY(n.value,WAVE_R-34);
    svg+=`<line class="wave-needle-line" x1="${WAVE_CX}" y1="${WAVE_CY}" x2="${tip.x.toFixed(2)}" y2="${tip.y.toFixed(2)}" style="stroke:${n.color}"/>`;
    svg+=`<circle class="wave-needle-dot" cx="${tip.x.toFixed(2)}" cy="${tip.y.toFixed(2)}" r="7" style="fill:${n.color}"/>`;
    svg+=`<text class="wave-needle-name" x="${namePos.x.toFixed(2)}" y="${namePos.y.toFixed(2)}" style="fill:${n.color}">${esc(n.label||'')}</text>`;
  });
  svg+=`<circle class="wave-pivot" cx="${WAVE_CX}" cy="${WAVE_CY}" r="4"/></svg>`;
  return svg;
}
socket.on('wave:round',({roundNumber,roundCount,left,right,psychicName})=>{
  $('tv-status-label').textContent=`La Frecuencia · Ronda ${roundNumber}/${roundCount}`;
  $('tv-content').innerHTML=`<div class="center-flex"><h1 style="font-size:1.8rem;text-align:center;">🔮 ${esc(psychicName)} está pensando su pista...</h1>${renderTvWaveDial(left,right,null,[])}</div>`;
});
socket.on('wave:guessing_start',({left,right})=>{
  $('tv-content').innerHTML=`<div class="center-flex"><h1 style="font-size:1.8rem;">Todos están adivinando...</h1>${renderTvWaveDial(left,right,null,[])}</div>`;
});
socket.on('wave:reveal',({target,left,right,psychicName,psychicScore,guesses})=>{
  const needles=(guesses||[]).map(g=>({value:g.value,color:avatarColor(g.id),label:g.name}));
  let h=`<div class="center-flex">${renderTvWaveDial(left,right,target,needles)}<div class="card" style="width:100%;max-width:420px;margin-top:16px;">`;
  h+=`<div class="score-row"><span style="flex:1;">🔮 ${esc(psychicName)} (Psíquico)</span><span class="points">+${psychicScore} pts</span></div>`;
  (guesses||[]).forEach(g=>{ h+=`<div class="score-row"><span style="flex:1;">${esc(g.name)}</span><span class="points">+${g.score} pts</span></div>`; });
  h+='</div></div>';
  $('tv-content').innerHTML=h;
});

function posGroup(p){ if(p==='POR')return 'portero'; if(['LD','DFC','LI'].includes(p))return 'defensa'; if(['MCD','MC','MCO'].includes(p))return 'mediocampista'; return 'delantero'; }
// Misma lógica que public/app.js: imágenes propias del servidor, no Wikipedia.
//   revealed=false -> silueta (/images/siluetas/<id>.png), revealed=true -> foto (/images/reales/<id>.png)
function loadTvSil(cardId,posName,revealed,imgId,phId){
  const img=$(imgId||'tv-sil'), ph=$(phId||'tv-sil-ph');
  if(!img)return;
  if(!cardId){ img.classList.add('hidden'); if(ph)ph.classList.remove('hidden'); return; }
  const carpeta = revealed ? 'reales' : 'siluetas';
  img.className = revealed ? 'silhouette-img revealed' : 'silhouette-img';
  img.onerror = ()=>{ img.classList.add('hidden'); if(ph)ph.classList.remove('hidden'); };
  img.onload = ()=>{ img.classList.remove('hidden'); if(ph)ph.classList.add('hidden'); };
  img.src = `/images/${carpeta}/${encodeURIComponent(cardId)}.png`;
}
</script>
</body>
</html>
